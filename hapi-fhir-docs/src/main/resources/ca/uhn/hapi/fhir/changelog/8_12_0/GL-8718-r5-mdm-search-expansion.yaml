title: "SearchParameterUtil now correctly recognizes patient-named reference search parameters
  that use the .where(resolve() is Patient) alias pattern (e.g. Observation, CarePlan, and
  ~50 other R4/R5 resources) as Patient compartment members. Previously only Device.patient
  was special-cased, causing compartment-based access checks and MDM auto-expansion to silently
  skip searches using the patient search parameter on these resources."
