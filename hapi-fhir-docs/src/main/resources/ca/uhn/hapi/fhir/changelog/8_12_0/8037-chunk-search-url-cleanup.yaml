---
type: fix
issue: 8037
title: "Fixed: The scheduled cleanup of stale entries in HFJ_RES_SEARCH_URL issued a single unbounded DELETE
   that could exceed the database per-statement timeout once the table grew large, causing the cleanup to roll
   back and stale entries to accumulate indefinitely. Cleanup now removes stale rows in paged batches so each
   statement stays well within the timeout."
