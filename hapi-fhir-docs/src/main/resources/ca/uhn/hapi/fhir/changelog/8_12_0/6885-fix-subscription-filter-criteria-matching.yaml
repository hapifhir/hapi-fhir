---
type: fix
issue: 6885
title: "Previously, a `Subscription` whose criteria used the `_filter` search parameter would fire for
every resource of the matching type instead of only those satisfying the filter, because `_filter` was
silently dropped during match URL parsing. The `_filter` parameter is now retained when parsing match URLs,
subscription criteria containing `_filter` correctly fall back to the database matching strategy, and
such subscriptions are rejected at submission time when the `_filter` parameter is disabled on the server.
This also fixes `_filter` being silently ignored in other match URL contexts such as conditional operations
and bulk export type filters."
