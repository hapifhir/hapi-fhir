---
type: fix
jira: SMILE-11955
title: "Previously, when operating in patient-id partition mode, the use of chained SP in searches would error out
(HAPI-1322) even if the target of the chain is provided with the search (`Observation?subject=Patient/abc&subject.gender=female`).    
    
Because `patient` and `subject` search parameters can only reference a single `Patient` and patient-id partitioning mode 
requires a direct patient reference to be included in searches,  we have allowed chaining on `patient` and `subject` SPs
since the partition for any chained sub-query on these two can always be resolved from the context."
