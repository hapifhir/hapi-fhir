title: "Previously, built-in SearchParameters required for system operation (`Basic:*`,
`Subscription:*`, `SearchParameter:*`, and `*:url`) could be inadvertently retired when
broad disable patterns were configured or when enable patterns did not cover them. This
could cause the Subscription module and terminology services to fail. This has been fixed."
