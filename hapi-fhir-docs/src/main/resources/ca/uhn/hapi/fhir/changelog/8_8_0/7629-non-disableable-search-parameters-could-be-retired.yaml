---
type: fix
issue: 7629
jira: SMILE-11357
title: "Previously, if a built-in SearchParameter required for system operation (`Basic:*`,
`Subscription:*`, `SearchParameter:*`, and `*:url`) was marked as retired in the database,
the search parameter registry cache would reflect that retired status, potentially causing
dependent services to fail. The registry now always preserves the active state of these
SearchParameters regardless of their status in the database."
