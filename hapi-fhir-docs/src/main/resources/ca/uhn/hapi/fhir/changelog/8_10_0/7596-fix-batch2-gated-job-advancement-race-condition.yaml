---
type: fix
issue: 7596
jira: SMILE-11603
title: "Fixed a race condition in the batch2 framework where work chunks produced by slow workers
  after a gated job step had already advanced could be permanently stuck in GATE_WAITING status.
  Work chunks for gated jobs now check the job instance's current gated step at creation time
  and start in READY status when they target the step already being processed, preventing orphaned
  chunks in the common case. The maintenance run retains a safety net that flips any remaining
  GATE_WAITING chunks for the current step to READY on each pass, covering the narrow race window
  between step advancement and chunk creation."
