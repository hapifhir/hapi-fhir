---
type: fix
issue: 7596
jira: SMILE-11603
title: "Fixed a race condition in the batch2 framework where work chunks produced by slow workers
  after a gated job step had already advanced could be permanently stuck in GATE_WAITING status.
  Step advancement now atomically flips existing GATE_WAITING chunks for the new current step to
  READY. Additionally, the maintenance run flips any remaining GATE_WAITING chunks for the current
  step to READY on each pass, catching late-arriving chunks produced by slow workers after
  advancement."
