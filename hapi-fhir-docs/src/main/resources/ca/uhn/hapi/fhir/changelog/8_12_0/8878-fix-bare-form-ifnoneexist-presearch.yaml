---
type: fix
title: "Conditional-create `ifNoneExist` URLs in the FHIR-spec bare query form
  (e.g. `identifier=http://system|value`, without a leading `?`) are now included in the batched
  pre-fetch performed before transaction processing, the same as full-URL-form conditional URLs
  (e.g. `Patient?identifier=http://system|value`), rather than each entry issuing a separate match
  search at execution time."
